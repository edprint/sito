# ============================================================
# EDPRINT — configurazione CMS (Sveltia, compatibile Decap)
# I contenuti sono salvati come file JSON nel repo GitHub.
# ============================================================

backend:
  name: github
  repo: edprint/sito               # repo ufficiale
  branch: main
  # Origine che ospita la funzione OAuth (le API su Vercel di questo stesso sito).
  base_url: https://sito-weld.vercel.app
  auth_endpoint: api/auth

# Messaggio di commit quando il cliente salva
site_url: https://sito-weld.vercel.app
display_url: https://sito-weld.vercel.app

# Dove finiscono le immagini caricate dal cliente
media_folder: "public/uploads"
public_folder: "/uploads"

# Lingua del pannello
locale: it

collections:
  - name: products
    label: Prodotti (tutte le pagine servizio)
    label_singular: Prodotto
    description: >
      Un prodotto compare in due posti, scelti dalla sua Sottocategoria:
      nella pagina della categoria (nome nell'elenco + riquadro in galleria)
      e nella pagina della sottocategoria (scheda con descrizione, galleria e
      bottone preventivo). ATTENZIONE: la Sottocategoria deve appartenere alla
      Categoria scelta — il numero davanti all'etichetta lo dice (1.x = Stampa,
      2.x = Decorazioni, 3.x = Strutture, 4.x = Gadget).
      Trascina le immagini nell'ordine in cui vuoi mostrarle.
    folder: content/products
    create: true
    delete: true
    extension: json
    format: json
    identifier_field: title
    slug: "{{fields.order}}-{{slug}}"
    sortable_fields: [order, title]
    summary: "{{fields.order}} · {{title}}"
    fields:
      - { name: title, label: Nome prodotto, widget: string }
      - {
          name: order,
          label: Ordine (in che posizione appare),
          widget: number,
          value_type: int,
          default: 99,
        }
      - name: categoria
        label: Categoria di servizio (in quale pagina appare)
        widget: select
        default: stampa
        options:
          - { label: Stampa, value: stampa }
          - { label: Decorazioni ed allestimenti, value: decorazioni }
          - { label: Strutture espositive, value: strutture }
          - { label: Gadget e merchandising, value: gadget }
      - name: sottocategoria
        label: Sottocategoria (in quale sezione della pagina appare)
        hint: >
          Sceglila coerente con la Categoria (1.x Stampa, 2.x Decorazioni,
          3.x Strutture, 4.x Gadget): in caso di conflitto vince questa.
        widget: select
        default: stampati-commerciali
        options:
          - { label: "1.1 Stampati commerciali", value: stampati-commerciali }
          - { label: "1.2 Brochure, cataloghi, libri", value: brochure-cataloghi-libri }
          - { label: "1.3 Stampe promozionali", value: stampe-promozionali }
          - { label: "1.4 Packaging, etichette, sticker", value: packaging-etichette-sticker }
          - { label: "1.5 Manifesti, poster, striscioni", value: manifesti-poster-striscioni }
          - { label: "1.6 Adesivi e materiali rigidi", value: adesivi-materiali-rigidi }
          - { label: "2.1 Decorazione vetrine", value: decorazione-vetrine }
          - { label: "2.2 Decorazione automezzi", value: decorazione-automezzi }
          - { label: "2.3 Interior design", value: interior-design }
          - { label: "2.4 Insegne e totem", value: insegne-totem }
          - { label: "3.1 Fondali, rollup, totem", value: fondali-rollup-totem }
          - { label: "3.2 Desk e postazioni", value: desk-postazioni }
          - { label: "3.3 Strutture per punto vendita e showroom", value: punto-vendita-showroom }
          - { label: "4.1 Gadget per eventi e fiere", value: gadget-eventi-fiere }
          - { label: "4.2 Kit personalizzati", value: kit-personalizzati }
          - { label: "4.3 Premiazioni", value: premiazioni }
      - name: settori
        label: Settori (uno o più tag)
        widget: select
        multiple: true
        required: false
        options:
          - { label: "Aziende, PMI", value: aziende }
          - { label: "PA, Scuole, Associazioni", value: pa }
          - { label: "Horeca, Negozi, Attività locali", value: horeca }
          - { label: "Studi professionali, specialistici", value: studi }
      - name: descrizione
        label: Breve descrizione
        hint: >
          Una o due righe. Si rivela passando il mouse sul nome, nella galleria
          della pagina categoria; nella scheda prodotto è il paragrafo di
          sinistra.
        widget: text
      - name: descrizione2
        label: Dettagli (secondo paragrafo della scheda)
        hint: >
          Il paragrafo di destra della scheda prodotto: materiali e finiture,
          formati, tirature minime, tempi di consegna. Due o tre righe, così da
          bilanciare la colonna a fianco. Se lo lasci vuoto, resta un testo
          segnaposto ben visibile.
        widget: text
        required: false
      - name: formato
        label: Formato del riquadro
        widget: select
        default: verticale
        options:
          - { label: Verticale, value: verticale }
          - { label: Orizzontale, value: orizzontale }
          - { label: Quadrato, value: quadrato }
          - { label: Panoramico, value: panoramico }
      - {
          name: hue,
          label: "Tinta segnaposto (0–360, usata solo se non ci sono immagini)",
          widget: number,
          value_type: int,
          default: 12,
          required: false,
        }
      - name: images
        label: Immagini
        label_singular: Immagine
        widget: list
        summary: "{{fields.alt}}"
        fields:
          - { name: src, label: File immagine, widget: image }
          - {
              name: alt,
              label: Descrizione (per accessibilità/SEO),
              widget: string,
              required: false,
            }
